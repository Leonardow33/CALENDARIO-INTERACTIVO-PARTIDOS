name: Actualizar Partidos Semana

on:
  schedule:
    - cron: '0 11 * * 1'   # Lunes 6:00 AM Lima (UTC-5)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch partidos desde ESPN API
        run: |
          pip install requests -q
          python3 - << 'PYEOF'
          import json, sys, requests
          from datetime import datetime, timedelta, timezone

          MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']

          LEAGUES = [
              ('fifa.world',            'Mundial 2026'),
              ('per.1',                 'Liga 1 Perú'),
              ('conmebol.libertadores', 'Libertadores'),
              ('conmebol.sudamericana', 'Sudamericana'),
              ('uefa.champions',        'Champions League'),
              ('uefa.europa',           'Europa League'),
              ('eng.1',                 'Premier League'),
          ]

          IMPORTANT_TEAMS = {
              'Alianza Lima', 'Universitario', 'Universitario de Deportes',
              'Sporting Cristal', 'Melgar', 'Cienciano', 'Cusco FC',
              'Alianza Atlético', 'Atlético Junior',
              'Boca Juniors', 'River Plate', 'Flamengo', 'Palmeiras',
              'Peñarol', 'Nacional', 'São Paulo', 'Corinthians',
              'Estudiantes LP', 'Fluminense',
          }
          ALWAYS_IMPORTANT = {'Champions League'}

          def get_week_range():
              lima = datetime.now(timezone.utc) - timedelta(hours=5)
              today = lima.replace(hour=0, minute=0, second=0, microsecond=0)
              monday = today - timedelta(days=today.weekday())
              sunday = monday + timedelta(days=6)
              return monday, sunday

          def fmt_time(dt_str):
              if dt_str.endswith('Z'):
                  dt_str = dt_str[:-1] + '+00:00'
              dt_lima = datetime.fromisoformat(dt_str).astimezone(timezone.utc) - timedelta(hours=5)
              h = dt_lima.hour % 12 or 12
              return f"{h}:{dt_lima.strftime('%M')} {'AM' if dt_lima.hour < 12 else 'PM'}"

          def fmt_day(dt_str):
              if dt_str.endswith('Z'):
                  dt_str = dt_str[:-1] + '+00:00'
              dt_lima = datetime.fromisoformat(dt_str).astimezone(timezone.utc) - timedelta(hours=5)
              return f"{dt_lima.day} {MONTHS[dt_lima.month - 1]}"

          def is_important(home, away, liga):
              if liga in ALWAYS_IMPORTANT:
                  return True
              return home in IMPORTANT_TEAMS or away in IMPORTANT_TEAMS

          def fetch_week(monday):
              seen_ids = set()
              matches = []
              for day_offset in range(7):
                  day = monday + timedelta(days=day_offset)
                  ds  = day.strftime('%Y%m%d')
                  for slug, liga in LEAGUES:
                      try:
                          url  = f"https://site.api.espn.com/apis/site/v2/sports/soccer/{slug}/scoreboard"
                          resp = requests.get(url, params={"dates": ds}, timeout=15)
                          resp.raise_for_status()
                          events = resp.json().get('events', [])
                          count  = 0
                          for ev in events:
                              eid = ev.get('id', '')
                              if eid in seen_ids:
                                  continue
                              seen_ids.add(eid)
                              comp        = (ev.get('competitions') or [{}])[0]
                              competitors = comp.get('competitors', [])
                              home  = next((c['team']['displayName'] for c in competitors if c.get('homeAway') == 'home'), '')
                              away  = next((c['team']['displayName'] for c in competitors if c.get('homeAway') == 'away'), '')
                              dt    = ev.get('date', '')
                              venue = (comp.get('venue') or {}).get('fullName', '')
                              m = {
                                  "day":   fmt_day(dt),
                                  "liga":  liga,
                                  "home":  home,
                                  "away":  away,
                                  "time":  fmt_time(dt),
                                  "venue": venue,
                              }
                              if is_important(home, away, liga):
                                  m['importante'] = True
                              matches.append(m)
                              count += 1
                          if count:
                              print(f"  {day.strftime('%a %d/%m')} {liga}: {count} partidos")
                      except Exception as e:
                          print(f"  {day.strftime('%a %d/%m')} {liga} ({slug}): ERROR - {e}")
              return matches

          monday, _ = get_week_range()
          matches = []
          week_label = monday

          for week_offset in range(5):
              w = monday + timedelta(weeks=week_offset)
              print(f"Semana: {w.strftime('%Y-%m-%d')} → {(w + timedelta(6)).strftime('%Y-%m-%d')}")
              matches = fetch_week(w)
              if matches:
                  week_label = w
                  break
              print("  (sin partidos, probando semana siguiente...)")

          mo = {m: i for i, m in enumerate(MONTHS)}
          matches.sort(key=lambda m: (
              mo.get(m['day'].split()[1], 0),
              int(m['day'].split()[0]),
              m['time']
          ))

          with open('partidos.json', 'w', encoding='utf-8') as f:
              json.dump({
                  "_actualizado": week_label.strftime('%Y-%m-%d'),
                  "_nota": "Generado automáticamente vía ESPN API. Agrega importante:true manualmente si quieres.",
                  "matches": matches
              }, f, ensure_ascii=False, indent=2)

          print(f"\nTotal: {len(matches)} partidos → partidos.json")
          PYEOF

      - name: Commit si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add partidos.json
          git diff --cached --quiet || \
            (git commit -m "chore: partidos semana $(date +%Y-%m-%d)" && git pull --rebase && git push)
